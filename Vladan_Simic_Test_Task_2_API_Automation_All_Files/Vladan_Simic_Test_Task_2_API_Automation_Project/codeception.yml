namespace: Tests
support_namespace: Support

paths:
  tests: tests
  output: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs

actor_suffix: Tester

settings:
  colors: true
  memory_limit: 1024M
  bootstrap: _bootstrap.php

params:
  - .env

extensions:
  enabled:
    - Codeception\Extension\RunFailed

